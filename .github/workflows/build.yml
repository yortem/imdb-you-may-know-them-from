name: Build extensions

on: push

jobs:
  build:
    permissions:
      contents: write
    name: Build extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create build directory
        run: mkdir -p build
      - name: Zip extension
        run: cd src && zip -r ../build/extension.zip .
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/*.zip
